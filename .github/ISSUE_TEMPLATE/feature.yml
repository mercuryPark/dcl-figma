name: Feature request
description: Suggest a new capability or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please check the roadmap in `README.md` first — some items are intentionally scoped out of v1.x.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What LLM-coding workflow are you trying to improve? Be specific.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature from the user's point of view.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why this one wins.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Dump engine (extraction / tokens / slim)
        - Plugin UI
        - Output schema
        - Distribution (CI / release / publish)
        - Docs
    validations:
      required: true
  - type: textarea
    id: figma-file
    attributes:
      label: Example Figma file (optional)
      description: Share a file that illustrates the need.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy invariant
      options:
        - label: This feature does NOT require network access.
          required: true
