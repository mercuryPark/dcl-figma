name: Bug report
description: Something is broken — the plugin crashes, produces wrong JSON, or the UI fails.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve **Design Context for LLMs**. Please fill in every field — reports without reproduction steps are hard to act on.
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      description: From `manifest.json` or Figma's "Manage plugins".
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: figma-desktop
    attributes:
      label: Figma Desktop version
      description: Figma menu → About Figma.
      placeholder: "e.g. 124.10.2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux (unofficial)
    validations:
      required: true
  - type: input
    id: figma-file
    attributes:
      label: Figma file link (public sample if possible)
      description: A minimal public Community file that reproduces the bug helps a lot.
      placeholder: "https://www.figma.com/file/..."
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Numbered steps that reproduce the issue.
      placeholder: |
        1. Open file X
        2. Click Dump
        3. Observe Y
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error message text.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console logs / stack traces
      description: From Figma's plugin dev console.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I confirmed `networkAccess.allowedDomains` is unchanged in my local build.
          required: true
