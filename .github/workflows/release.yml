name: Release tag format

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-tag:
    name: verify tag
    runs-on: ubuntu-latest
    steps:
      - name: Check semver tag format
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "Tag: $TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match vMAJOR.MINOR.PATCH[-prerelease]. Refusing to cut a release."
            exit 1
          fi
          echo "Tag format OK."
