<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0B0B0F"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo -->
  <g transform="translate(72, 72)">
    <rect width="96" height="96" rx="18" fill="#14141A" stroke="#26262C"/>
    <path d="M34 24 C 28 24, 25 27, 25 33 L 25 44 C 25 47, 22 49, 19 49 C 22 49, 25 51, 25 54 L 25 65 C 25 71, 28 74, 34 74" fill="none" stroke="#59E8B5" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M62 24 C 68 24, 71 27, 71 33 L 71 44 C 71 47, 74 49, 77 49 C 74 49, 71 51, 71 54 L 71 65 C 71 71, 68 74, 62 74" fill="none" stroke="#59E8B5" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="32" y="46" width="32" height="4.5" rx="1" fill="#FF6A3D"/>
  </g>

  <!-- Headline -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" fill="#F5F5F4">
    <text x="72" y="260" font-size="72" font-weight="700" letter-spacing="-1">Design Context</text>
    <text x="72" y="340" font-size="72" font-weight="700" letter-spacing="-1">for LLMs</text>
    <text x="72" y="400" font-size="28" fill="#59E8B5">Figma → JSON. Ready for your LLM.</text>
  </g>

  <!-- Feature chips -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" fill="#9A9A99">
    <rect x="72" y="450" width="210" height="40" rx="8" fill="none" stroke="rgba(89,232,181,0.3)"/>
    <text x="94" y="476" fill="#59E8B5">$ zero network</text>

    <rect x="300" y="450" width="220" height="40" rx="8" fill="none" stroke="rgba(89,232,181,0.3)"/>
    <text x="322" y="476" fill="#59E8B5">$ zero telemetry</text>

    <rect x="538" y="450" width="190" height="40" rx="8" fill="none" stroke="rgba(255,106,61,0.3)"/>
    <text x="560" y="476" fill="#FF6A3D">$ MIT licensed</text>
  </g>

  <!-- Code card -->
  <g transform="translate(760, 120)">
    <rect width="380" height="390" rx="14" fill="#14141A" stroke="#26262C"/>
    <!-- title bar -->
    <rect width="380" height="32" rx="14" fill="#0F0F14"/>
    <rect y="20" width="380" height="12" fill="#0F0F14"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="16" r="5" fill="#27c93f"/>
    <text x="80" y="20" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6C6C70">figma.my-design.home.slim.json</text>

    <g font-family="'JetBrains Mono', monospace" font-size="14" fill="#F5F5F4">
      <text x="20" y="70"><tspan fill="#9A9A99">{</tspan></text>
      <text x="36" y="94"><tspan fill="#59E8B5">"$schema"</tspan><tspan fill="#9A9A99">: </tspan><tspan fill="#FF6A3D">"..."</tspan></text>
      <text x="36" y="118"><tspan fill="#59E8B5">"schemaVersion"</tspan><tspan fill="#9A9A99">: </tspan><tspan fill="#FF6A3D">"1.0"</tspan></text>
      <text x="36" y="142"><tspan fill="#59E8B5">"meta"</tspan><tspan fill="#9A9A99">: {</tspan></text>
      <text x="52" y="166"><tspan fill="#59E8B5">"tool"</tspan><tspan fill="#9A9A99">: </tspan><tspan fill="#FF6A3D">"dcl-figma@0.1.0"</tspan></text>
      <text x="52" y="190"><tspan fill="#59E8B5">"stats"</tspan><tspan fill="#9A9A99">: { </tspan><tspan fill="#59E8B5">"totalNodes"</tspan><tspan fill="#9A9A99">: </tspan><tspan fill="#E0C9F5">8335</tspan><tspan fill="#9A9A99"> }</tspan></text>
      <text x="36" y="214"><tspan fill="#9A9A99">},</tspan></text>
      <text x="36" y="238"><tspan fill="#59E8B5">"screens"</tspan><tspan fill="#9A9A99">: [ </tspan><tspan fill="#6C6C70">/* 92 screens */</tspan><tspan fill="#9A9A99"> ],</tspan></text>
      <text x="36" y="262"><tspan fill="#59E8B5">"tokens"</tspan><tspan fill="#9A9A99">: { ... }</tspan></text>
      <text x="20" y="286"><tspan fill="#9A9A99">}</tspan></text>
    </g>
  </g>

  <!-- Footer tag -->
  <text x="1128" y="600" font-family="'JetBrains Mono', monospace" font-size="14" fill="#6C6C70" text-anchor="end">mercuryPark · MIT</text>
</svg>
